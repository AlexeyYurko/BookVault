<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BookVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.6.6/flowbite.min.css" rel="stylesheet"/>
    <link href="{{ url_for('static', path='css/styles.css') }}" rel="stylesheet"/>
    <script src="https://unpkg.com/htmx.org@1.8.4"
            integrity="sha384-wg5Y/JwF7VxGk4zLsJEcAojRtlVp1FKKdGy1qN+OMtdq72WRvX/EdRdqg/LOhYeV"
            crossorigin="anonymous"></script>
</head>

<body class="h-screen bg-gray-100">
<header class="sticky top-0 bg-white border-b border-gray-200">
    {% include "navbar.html" %}
</header>

{% set sync_msg = request.query_params.get('sync_msg', '') %}
{% if sync_msg %}
<div class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded relative" role="alert">
    <span>{{ sync_msg }}</span>
    <button class="absolute top-0 bottom-0 right-0 px-4 py-3" onclick="this.parentElement.style.display='none'">&times;</button>
</div>
{% endif %}

{% block content %}
{% endblock %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.6.6/flowbite.min.js"></script>
</body>

</html>
